spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: authentication-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
            - id: employees-service
              uri: lb://EMPLOYEES-SERVICE
              predicates:
                - Path=/protected/**
              filters:
                - AuthenticationFilter
            - id: invoice-service
              uri: lb://INVOICE-SERVICE
              predicates:
                - Path=/invoices/**
              filters:
                - AuthenticationFilter
            - id: company-service
              uri: lb://COMPANY-SERVICE
              predicates:
                - Path=/companies/**
              filters:
                - AuthenticationFilter
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "http://localhost:4200"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - OPTIONS
                allowed-headers: "*"
                allowed-credentials: true

  application:
    name: GATEWAY-SERVICE

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/


